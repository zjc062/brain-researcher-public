name: Benchmark Task Review
description: Review benchmark task wording, outputs, and pass criteria.
title: "[BENCH] "
labels:
  - area/benchmark
  - type/scientific-review
body:
  - type: dropdown
    id: entry_surface
    attributes:
      label: Entry surface
      options:
        - Benchmark
        - Benchmark + Governance tab
        - Benchmark + Dataset tab
    validations:
      required: true

  - type: textarea
    id: page_urls
    attributes:
      label: Page URL(s)
      placeholder: https://brain-researcher.com/benchmark
    validations:
      required: true

  - type: textarea
    id: click_path
    attributes:
      label: Click path / reproduction steps
      placeholder: |
        1. Open Benchmark
        2. Select dataset
        3. Search task by ID
        4. Open task details and inspect sections
    validations:
      required: true

  - type: input
    id: dataset
    attributes:
      label: Benchmark dataset
      placeholder: NeuroimageCodeBench v3.1
    validations:
      required: true

  - type: input
    id: task_id
    attributes:
      label: Task ID
      placeholder: CLIN-005
    validations:
      required: true

  - type: dropdown
    id: section
    attributes:
      label: Primary section reviewed
      options:
        - Scope
        - Goal
        - Input Requirements
        - Required Outputs
        - Pass Criteria
        - Expected Results
        - Governance metadata
        - Multiple sections
    validations:
      required: true

  - type: textarea
    id: context_ids
    attributes:
      label: IDs and context
      placeholder: Include task IDs, related output file names, or governance fields referenced
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected wording/behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual wording/behavior
      placeholder: What is ambiguous, inconsistent, or scientifically weak
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Suggested fix
      placeholder: Provide exact wording or validation logic if possible
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      placeholder: Screenshots, copied text, or specific line fragments from the task card
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I did not include PHI, secrets, or private credentials.
          required: true
