name: Studio <-> MCP Handoff Issue
description: Report state sync issues between Studio plan and MCP execution.
title: "[HANDOFF] "
labels:
  - area/studio
  - area/mcp
  - type/bug
body:
  - type: dropdown
    id: entry_surface
    attributes:
      label: Entry surface
      options:
        - Studio then MCP
        - MCP then Studio
        - Both directions
    validations:
      required: true

  - type: textarea
    id: page_urls
    attributes:
      label: Page URL(s)
      placeholder: Studio URL(s) plus relevant docs/setup links
    validations:
      required: true

  - type: textarea
    id: click_path
    attributes:
      label: Click path / reproduction steps
      placeholder: |
        1. Configure plan in Studio
        2. Trigger run via MCP in IDE
        3. Observe handoff mismatch
    validations:
      required: true

  - type: textarea
    id: studio_state
    attributes:
      label: Studio plan state
      placeholder: Data, Concepts, Pipeline, Verify status
    validations:
      required: true

  - type: textarea
    id: mcp_prompt
    attributes:
      label: MCP prompt used
    validations:
      required: true

  - type: textarea
    id: context_ids
    attributes:
      label: IDs and context
      placeholder: runId, sessionId, tool IDs, payload contract versions
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected handoff behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual handoff failure
      placeholder: Missing fields, default mismatch, version mismatch, contract drift
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      placeholder: Logs, payload snippets, and screenshots
    validations:
      required: true
