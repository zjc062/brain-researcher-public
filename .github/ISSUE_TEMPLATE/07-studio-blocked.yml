name: Studio Run Blocked Report
description: Report where Verify is blocked and what guidance is missing.
title: "[STUDIO] Blocked - "
labels:
  - area/studio
  - type/bug
body:
  - type: input
    id: pipeline
    attributes:
      label: Pipeline or workflow name
      placeholder: Preprocessing and QC
    validations:
      required: true

  - type: dropdown
    id: blocked_item
    attributes:
      label: Blocked Verify item
      options:
        - Data validated
        - Workflow compatible
        - All inputs provided
        - Credits sufficient
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps taken
      placeholder: |
        1. New Chat
        2. Browse dataset/concepts
        3. Select pipeline
        4. Verify becomes blocked
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected guidance
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual guidance shown
    validations:
      required: true

  - type: dropdown
    id: used_agent_fix
    attributes:
      label: Did you click Ask Agent to fix?
      options:
        - Yes
        - No
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested UX fix
    validations:
      required: true
