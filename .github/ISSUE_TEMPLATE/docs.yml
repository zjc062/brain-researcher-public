name: Documentation issue
description: Report missing, incorrect, or unclear documentation
title: "[Docs]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving docs quality.
        Please be specific so maintainers can apply the change quickly.

  - type: input
    id: location
    attributes:
      label: Page or file location
      description: URL or path to the doc page.
      placeholder: README.md or https://...
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Documentation issue type
      options:
        - Incorrect information
        - Missing steps
        - Unclear explanation
        - Broken link
        - Outdated content
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current text or behavior
      description: Quote or summarize what is currently there.
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix
      description: Proposed replacement text or structure.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Why this matters
      description: What confusion or risk does this avoid?
    validations:
      required: true

