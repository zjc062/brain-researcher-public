name: Bug report
description: Report a reproducible bug, execution failure, or payload mismatch
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please include exact IDs and reproducible steps so we can verify quickly.
        Do not include PHI, credentials, or private infrastructure details.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: Verify blocked in Studio after selecting a dataset.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: Where did this happen?
      options:
        - Studio
        - Workflow Library
        - Benchmark
        - NeuroKG
        - Hypothesis Explorer
        - MCP Bridge
        - Tool execution
        - Dataset loading
        - Other
    validations:
      required: true

  - type: textarea
    id: identifiers
    attributes:
      label: Relevant IDs
      description: Include exact IDs when available.
      placeholder: workflow_name, task_id, tool_id, node_id, run_id, dataset_id
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal, deterministic steps.
      placeholder: |
        1. Go to ...
        2. Set ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: artifacts
    attributes:
      label: Evidence artifacts
      description: Error message, stack trace, logs, screenshot, or payload snippet.
      placeholder: Paste the relevant excerpt.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app version, branch/commit, or IDE details.
      placeholder: Ubuntu 24.04, Chrome 133, commit abc123, Codex CLI
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Privacy and safety checks
      options:
        - label: I confirm this report does not include PHI, secrets, or private credentials.
          required: true
        - label: I confirm I used data I am authorized to process.
          required: true

