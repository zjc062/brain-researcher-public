name: MCP Integration Report
description: Test trigger/search/schema/execution behavior in IDE agents.
title: "[MCP] "
labels:
  - area/mcp
  - type/bug
body:
  - type: dropdown
    id: ide
    attributes:
      label: IDE
      options:
        - Cursor
        - Claude Code
        - Codex
        - Other
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Prompt used
      placeholder: Include exact prompt, redact sensitive info
    validations:
      required: true

  - type: dropdown
    id: failure_mode
    attributes:
      label: Failure mode
      options:
        - Tool search failed
        - Tool schema lookup failed
        - Execution payload/schema mismatch
        - Boundary safety issue
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior or logs
    validations:
      required: true

  - type: textarea
    id: payload_excerpt
    attributes:
      label: Payload or error excerpt
      placeholder: Include JSON snippet if available
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I did not include PHI, secrets, or private credentials.
          required: true
