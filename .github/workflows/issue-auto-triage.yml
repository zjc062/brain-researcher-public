name: Issue Auto Triage

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Apply triage labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const title = (issue.title || "").trim().toLowerCase();

            const typeLabels = ["bug", "feature", "docs"];

            let inferred = null;
            if (title.startsWith("[bug]")) {
              inferred = "bug";
            } else if (title.startsWith("[feature]")) {
              inferred = "feature";
            } else if (title.startsWith("[docs]")) {
              inferred = "docs";
            }

            const existing = issue.labels.map((label) => label.name);

            const desired = ["needs-triage"];
            if (inferred) {
              desired.push(inferred);
            }

            const toAdd = desired.filter((name) => !existing.includes(name));
            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: toAdd,
              });
            }

            if (inferred) {
              const toRemove = typeLabels.filter(
                (name) => name !== inferred && existing.includes(name)
              );
              for (const name of toRemove) {
                await github.rest.issues
                  .removeLabel({ owner, repo, issue_number, name })
                  .catch(() => {});
              }
            }

